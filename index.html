<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Battery Health Degradation Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Mobile Battery Health Degradation Prediction</h1>
        <form method="POST">
            <label>Charging Cycles:</label>
            <input type="number" step="any" name="cycle" required>

            <label>Charging Temperature (°C):</label>
            <input type="number" step="any" name="chT" required>

            <label>Charging Voltage (V):</label>
            <input type="number" step="any" name="chV" required>

            <label>Discharge Temperature (°C):</label>
            <input type="number" step="any" name="disT" required>

            <button type="submit">Predict SOH</button>
        </form>

        {% if message %}
        <div class="result">
            <h2>{{ message }}</h2>
        </div>
        {% endif %}
    </div>
</body>
</html>
